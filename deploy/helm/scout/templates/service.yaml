apiVersion: v1
kind: Service
metadata:
  name: {{ include "scout.fullname" . }}
  labels:
    {{- include "scout.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.agentPort }}
      targetPort: agent
      protocol: TCP
      name: agent
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "scout.selectorLabels" . | nindent 4 }}
