replicaCount: 1

image:
  repository: ghcr.io/inovacc/scout
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9551

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

shmSize: "2Gi"

scout:
  headless: true
  noSandbox: true
  stealth: false

## Batch job configuration (disabled by default)
job:
  enabled: false
  name: scrape
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  restartPolicy: OnFailure
  # parallelism: 4
  # completions: 4
  args:
    - scrape
    - --url=https://example.com
    - --output=/output/result.json
  env: []
  # outputVolume:
  #   persistentVolumeClaim:
  #     claimName: scout-output

nodeSelector: {}
tolerations: []
affinity: {}
