replicaCount: 1

image:
  repository: ghcr.io/inovacc/scout
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  grpcPort: 9551
  mcpPort: 8080
  agentPort: 9000

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "2"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

browser:
  headless: true
  stealth: true
  sandbox: false
  sharedMemory: "2Gi"

persistence:
  enabled: false
  storageClass: ""
  size: 10Gi
  mountPath: /home/nonroot/.scout

metrics:
  enabled: false
  port: 9090

## Batch job configuration (disabled by default)
job:
  enabled: false
  name: scrape
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  restartPolicy: OnFailure
  # parallelism: 4
  # completions: 4
  args:
    - scrape
    - --url=https://example.com
    - --output=/output/result.json
  env: []
  # outputVolume:
  #   persistentVolumeClaim:
  #     claimName: scout-output

nodeSelector: {}
tolerations: []
affinity: {}
