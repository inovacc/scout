suite: HPA tests
templates:
  - templates/hpa.yaml
tests:
  - it: should not render when autoscaling disabled
    set:
      autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when autoscaling enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 1
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: should target the deployment
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment

  - it: should set CPU utilization metric
    set:
      autoscaling.enabled: true
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 70

  - it: should set memory utilization metric
    set:
      autoscaling.enabled: true
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80

  - it: should use custom min and max replicas
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 3
      autoscaling.maxReplicas: 20
    asserts:
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 20
