syntax = "proto3";

package scout.v1;

option go_package = "github.com/inovacc/scout/grpc/scoutpb";

// ScoutService exposes real-time headless browser control with forensic capture.
service ScoutService {
  // Session lifecycle
  rpc CreateSession(CreateSessionRequest)   returns (CreateSessionResponse);
  rpc DestroySession(SessionRequest)        returns (Empty);

  // Navigation
  rpc Navigate(NavigateRequest)             returns (NavigateResponse);
  rpc Reload(SessionRequest)                returns (Empty);
  rpc GoBack(SessionRequest)                returns (Empty);
  rpc GoForward(SessionRequest)             returns (Empty);

  // Element interaction
  rpc Click(ElementRequest)                 returns (Empty);
  rpc DoubleClick(ElementRequest)           returns (Empty);
  rpc RightClick(ElementRequest)            returns (Empty);
  rpc Hover(ElementRequest)                 returns (Empty);
  rpc Type(TypeRequest)                     returns (Empty);
  rpc SelectOption(SelectRequest)           returns (Empty);
  rpc PressKey(KeyRequest)                  returns (Empty);

  // Query
  rpc GetText(ElementRequest)               returns (TextResponse);
  rpc GetAttribute(AttributeRequest)        returns (TextResponse);
  rpc GetTitle(SessionRequest)              returns (TextResponse);
  rpc GetURL(SessionRequest)                returns (TextResponse);
  rpc Eval(EvalRequest)                     returns (EvalResponse);
  rpc ElementExists(ElementRequest)         returns (BoolResponse);

  // Capture
  rpc Screenshot(ScreenshotRequest)         returns (ScreenshotResponse);
  rpc PDF(SessionRequest)                   returns (PDFResponse);

  // Forensic - network recording
  rpc StartRecording(RecordingRequest)      returns (Empty);
  rpc StopRecording(SessionRequest)         returns (Empty);
  rpc ExportHAR(SessionRequest)             returns (HARResponse);

  // Profile
  rpc CaptureProfile(CaptureProfileRequest) returns (CaptureProfileResponse);
  rpc LoadProfile(LoadProfileRequest)       returns (LoadProfileResponse);

  // Custom JS injection
  rpc InjectJS(InjectJSRequest)             returns (InjectJSResponse);

  // Session hijacking (real-time network capture)
  rpc StartHijack(HijackRequest)            returns (Empty);
  rpc StopHijack(SessionRequest)            returns (Empty);
  rpc StreamHijack(SessionRequest)          returns (stream HijackedEvent);

  // Real-time event stream (server -> client)
  rpc StreamEvents(SessionRequest)          returns (stream BrowserEvent);

  // Bidirectional: client sends commands, server streams events
  rpc Interactive(stream Command)           returns (stream BrowserEvent);

  // Swarm RPCs (distributed crawling)
  rpc JoinSwarm(JoinSwarmRequest)           returns (JoinSwarmResponse);
  rpc LeaveSwarm(LeaveSwarmRequest)         returns (LeaveSwarmResponse);
  rpc FetchBatch(FetchBatchRequest)         returns (FetchBatchResponse);
  rpc SubmitResults(SubmitResultsRequest)   returns (SubmitResultsResponse);
  rpc SwarmStatus(SwarmStatusRequest)       returns (SwarmStatusResponse);
}

// ---------------------- Messages ----------------------

message Empty {}

message CreateSessionRequest {
  bool   headless = 1;
  bool   stealth = 2;
  string proxy = 3;
  string user_agent = 4;
  int32  width = 5;
  int32  height = 6;
  string initial_url = 7;
  bool   record = 8;  // start recording immediately
  bool   capture_body = 9; // capture response bodies
  bool   maximized = 10; // start window maximized
  bool   devtools = 11; // open Chrome DevTools automatically
  bool   no_sandbox = 12; // disable browser sandbox (containers/WSL)
}

message CreateSessionResponse {
  string session_id = 1;
  string url = 2;
  string title = 3;
}

message SessionRequest {
  string session_id = 1;
}

message NavigateRequest {
  string session_id = 1;
  string url = 2;
  bool   wait_stable = 3;
}

message NavigateResponse {
  string url = 1;
  string title = 2;
  int32  status = 3;
}

message ElementRequest {
  string session_id = 1;
  string selector = 2;  // CSS selector or XPath
  bool   xpath = 3;
}

message TypeRequest {
  string session_id = 1;
  string selector = 2;
  string text = 3;
  bool   clear_first = 4;
}

message SelectRequest {
  string session_id = 1;
  string selector = 2;
  string value = 3;
}

message KeyRequest {
  string session_id = 1;
  string key = 2;  // e.g. "Enter", "Tab", "Escape"
  repeated string modifiers = 3; // "ctrl", "shift", "alt"
}

message AttributeRequest {
  string session_id = 1;
  string selector = 2;
  string attribute = 3;
}

message TextResponse {
  string text = 1;
}

message BoolResponse {
  bool value = 1;
}

message EvalRequest {
  string session_id = 1;
  string script = 2;
}

message EvalResponse {
  string result = 1;  // JSON-encoded result
}

message ScreenshotRequest {
  string session_id = 1;
  bool   full_page = 2;
  string format = 3;  // "png" or "jpeg"
  int32  quality = 4;  // jpeg quality 0-100
}

message ScreenshotResponse {
  bytes  data = 1;
  string format = 2;
}

message PDFResponse {
  bytes data = 1;
}

message RecordingRequest {
  string session_id = 1;
  bool   capture_body = 2;
}

message HARResponse {
  bytes  data = 1;  // HAR JSON
  int32  entry_count = 2;
}

// ---------------------- Hijack ----------------------

message HijackRequest {
  string session_id = 1;
  bool   capture_body = 2;
  repeated string url_patterns = 3;
  repeated string resource_types = 4;
}

message HijackedEvent {
  string session_id = 1;
  int64  timestamp = 2;  // unix millis

  oneof event {
    HijackedRequestEvent   request = 10;
    HijackedResponseEvent  response = 11;
    WebSocketFrameEvent    ws_frame = 12;
  }
}

message HijackedRequestEvent {
  string request_id = 1;
  string method = 2;
  string url = 3;
  map<string, string> headers = 4;
  string body = 5;
  string resource_type = 6;
}

message HijackedResponseEvent {
  string request_id = 1;
  string url = 2;
  int32  status = 3;
  map<string, string> headers = 4;
  string body = 5;
  string mime_type = 6;
  double elapsed_ms = 7;
}

message WebSocketFrameEvent {
  string request_id = 1;
  string url = 2;
  string direction = 3;  // "sent", "received", "opened", "closed"
  double opcode = 4;
  string payload = 5;
  bool   masked = 6;
}

// ---------------------- Profile ----------------------

message CaptureProfileRequest {
  string session_id = 1;
}

message CaptureProfileResponse {
  string profile_json = 1;
}

message LoadProfileRequest {
  string session_id = 1;
  string profile_json = 2;
}

message LoadProfileResponse {
  bool   success = 1;
  string error = 2;
}

// ---------------------- JS Injection ----------------------

message InjectJSRequest {
  string session_id = 1;
  string code = 2;            // raw JS code to evaluate
  string template_name = 3;   // built-in template name (alternative to code)
  string template_data = 4;   // JSON-encoded template data
}

message InjectJSResponse {
  string result = 1;  // JSON-encoded result
  string error = 2;   // error message if any
}

// ---------------------- Events ----------------------

message BrowserEvent {
  string session_id = 1;
  int64  timestamp = 2;  // unix millis

  oneof event {
    NetworkRequestEvent   request_sent = 10;
    NetworkResponseEvent  response_received = 11;
    ConsoleEvent          console = 12;
    PageEvent             page_event = 13;
    ErrorEvent            error = 14;
  }
}

message NetworkRequestEvent {
  string request_id = 1;
  string method = 2;
  string url = 3;
  map<string, string> headers = 4;
  string post_data = 5;
  string resource_type = 6;
}

message NetworkResponseEvent {
  string request_id = 1;
  string url = 2;
  int32  status = 3;
  string status_text = 4;
  map<string, string> headers = 5;
  string mime_type = 6;
  string remote_ip = 7;
  double time_ms = 8;
}

message ConsoleEvent {
  string level = 1;  // "log", "warn", "error", "info"
  string message = 2;
}

message PageEvent {
  string type = 1;  // "load", "domcontentloaded", "navigated", "dialog"
  string url = 2;
  string data = 3;
}

message ErrorEvent {
  string message = 1;
  string source = 2;
}

// -------------------- Interactive Command --------------------

message Command {
  string session_id = 1;
  string request_id = 2;  // for correlating responses

  oneof action {
    NavigateAction   navigate = 10;
    ClickAction      click = 11;
    TypeAction       type = 12;
    KeyAction        press_key = 13;
    EvalAction       eval = 14;
    ScreenshotAction screenshot = 15;
    WaitAction       wait = 16;
    ScrollAction     scroll = 17;
  }
}

message NavigateAction {string url = 1;}
message ClickAction    {string selector = 1;}
message TypeAction     {string selector = 1; string text = 2;}
message KeyAction      {string key = 1;}
message EvalAction     {string script = 1;}
message ScreenshotAction {bool full_page = 1;}
message WaitAction     {string selector = 1; int32 timeout_ms = 2;}
message ScrollAction   {int32 x = 1; int32 y = 2;}

// -------------------- Pairing Service --------------------

// PairingService runs on an insecure listener to exchange certificates
// between devices that want to establish mTLS trust.
service PairingService {
  rpc Pair(PairRequest) returns (PairResponse);
}

message PairRequest {
  string device_id = 1;  // client's device ID
  bytes  cert_der = 2;  // client's certificate in DER encoding
}

message PairResponse {
  string server_device_id = 1;  // server's device ID
  bytes  server_cert_der = 2;  // server's certificate in DER encoding
}

// -------------------- Swarm (Distributed Crawling) --------------------

message JoinSwarmRequest {
  string worker_id = 1;       // unique worker identifier
  string proxy = 2;           // optional proxy URL this worker uses
  map<string, string> labels = 3; // optional metadata (region, etc.)
}

message JoinSwarmResponse {
  bool   accepted = 1;
  string message = 2;         // human-readable status or rejection reason
  int32  batch_size = 3;      // coordinator-assigned batch size for this worker
  int32  heartbeat_interval_ms = 4; // how often the worker should call FetchBatch
}

message LeaveSwarmRequest {
  string worker_id = 1;
}

message LeaveSwarmResponse {
  bool   acknowledged = 1;
  int32  urls_requeued = 2;   // how many in-flight URLs were returned to the queue
}

message FetchBatchRequest {
  string worker_id = 1;
  int32  max_urls = 2;        // max URLs the worker wants (0 = use coordinator default)
}

message FetchBatchResponse {
  repeated CrawlURL urls = 1;
  bool   drain = 2;           // true when queue is empty and no more URLs expected
}

message CrawlURL {
  string url = 1;
  int32  depth = 2;
  string domain = 3;
}

message SubmitResultsRequest {
  string worker_id = 1;
  repeated CrawlResultEntry results = 2;
}

message CrawlResultEntry {
  string url = 1;
  int32  status_code = 2;
  string error = 3;
  repeated string discovered_urls = 4;
  string data_json = 5;       // JSON-encoded extracted data
  double duration_ms = 6;
}

message SubmitResultsResponse {
  int32  accepted = 1;        // number of results accepted
  int32  new_urls_queued = 2; // number of discovered URLs added to the queue
}

message SwarmStatusRequest {}

message SwarmStatusResponse {
  int32  total_workers = 1;
  int32  active_workers = 2;
  int64  urls_queued = 3;
  int64  urls_processed = 4;
  int64  urls_failed = 5;
  repeated SwarmWorkerInfo workers = 6;
}

message SwarmWorkerInfo {
  string worker_id = 1;
  string status = 2;          // "idle", "busy", "disconnected"
  string proxy = 3;
  int64  processed = 4;
  int64  last_seen_unix = 5;  // unix timestamp of last heartbeat
}
